<html>

{% include head.html %}

<body>

	{% include header.html %}


	<!-- Main -->
	<div id="main" class="alt">

		<!-- One -->
		<section id="one">
			<div class="inner">
				<header class="major">
					<h1>{{ page.title }}</h1>
				</header>
				{% if page.image %}<span class="image main"><img src="{{ site.baseurl }}/{{ page.image }}"
						alt="" /></span>{% endif %}
				<p>{{ content }}</p>
			</div>
		</section>

	</div>

	{% include footer.html %}

</body>

<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>

</html>
